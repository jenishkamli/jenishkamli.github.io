<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenish Kamli | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #0d0d0d);
  color: white;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav h1 {
  color: #00f7ff;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hero h2 {
  font-size: 3rem;
  text-align: center;
}

.highlight {
  color: #00f7ff;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid #00f7ff;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #00f7ff;
  color: black;
}

/* CARDS */
.dashboard {
  padding: 80px 40px;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  flex: 1;
  min-width: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

/* CHART */
.chart {
  max-width: 700px;
  margin: auto;
}

/* CHAT */
.chatbox {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 320px;
  background: rgba(0,0,0,0.7);
  border-radius: 15px;
  padding: 10px;
  backdrop-filter: blur(10px);
}

.messages {
  height: 200px;
  overflow-y: auto;
  font-size: 14px;
}

.chatbox input {
  width: 100%;
  padding: 10px;
  border: none;
  outline: none;
  margin-top: 5px;
}

/* GLOW */
.glow {
  text-shadow: 0 0 10px #00f7ff;
}

</style>
</head>

<body>

<nav>
  <h1>Jenish</h1>
  <div>
    <a href="#dashboard">Growth</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h2 class="glow">I Scale <span class="highlight">E-commerce Brands 🚀</span></h2>
  <p>Flipkart • Amazon • Meesho Growth Expert</p>
  <button class="btn" onclick="scrollToSection()">View Growth</button>
</section>

<section class="dashboard" id="dashboard">
  <h2>📊 Growth Dashboard</h2>

  <div class="cards">
    <div class="card"><h3>March</h3><p>2.8L</p></div>
    <div class="card"><h3>April</h3><p>6.7L</p></div>
    <div class="card"><h3>May</h3><p>13.2L</p></div>
    <div class="card"><h3>June</h3><p>18.4L</p></div>
    <div class="card"><h3>July</h3><p>20.2L 🔥</p></div>
  </div>

  <div class="chart">
    <canvas id="myChart"></canvas>
  </div>
</section>

<section id="contact" style="padding:80px 40px;">
  <h2>Contact</h2>
  <p>Email: jeniish.kamli@gmail.com</p>
</section>

<!-- CHAT -->
<div class="chatbox">
  <div class="messages" id="messages"></div>
  <input id="input" placeholder="Ask me anything..." onkeypress="chat(event)">
</div>

<script>

/* SCROLL */
function scrollToSection(){
  document.getElementById("dashboard").scrollIntoView({behavior:"smooth"});
}

/* GSAP ANIMATION */
gsap.from(".hero h2", {y:50, opacity:0, duration:1});
gsap.from(".card", {y:50, opacity:0, stagger:0.2});

/* CHART */
new Chart(document.getElementById("myChart"), {
  type: "line",
  data: {
    labels: ["Mar","Apr","May","Jun","Jul"],
    datasets: [{
      label: "Impressions Growth",
      data: [2.8,6.7,13.2,18.4,20.2],
      borderWidth: 2
    }]
  }
});

/* AI CHAT */
function chat(e){
  if(e.key === "Enter"){
    let input = document.getElementById("input").value.toLowerCase();
    let box = document.getElementById("messages");

    box.innerHTML += "<p><b>You:</b> "+input+"</p>";

    let reply = "I help scale brands using marketplace strategies 🚀";

    if(input.includes("growth")){
      reply = "Jenish scaled Flipkart from 2.8L to 20L impressions 📈";
    }

    if(input.includes("hire")){
      reply = "You can contact via email to work together 💼";
    }

    box.innerHTML += "<p><b>AI:</b> "+reply+"</p>";
    document.getElementById("input").value = "";
  }
}

</script>

</body>
</html>
